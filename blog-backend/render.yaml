services:
  - type: web
    name: blog-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # You will paste this from Neon dashboard
      - key: FRONTEND_URL
        sync: false   # Your Vercel frontend URL, e.g. https://your-site.vercel.app
      - key: ADMIN_PASSWORD
        sync: false   # Admin password used by /api/auth/login
      - key: JWT_SECRET
        generateValue: true
